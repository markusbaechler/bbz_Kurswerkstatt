<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bbz Kurswerkstatt</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d6f7a" />
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/bbz_Kurswerkstatt/service-worker.js');</script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>

  <style>
  /* ===== Design-Tokens — uebernommen aus produktions-cockpit-v0.2.html ===== */
  :root{
    --bg:#eef1f3; --surface:#ffffff; --surface-2:#e7ecef; --surface-3:#f6f8f9;
    --ink:#15222c; --ink-soft:#43535d; --muted:#71828c; --line:#d6dee2;
    --accent:#0d6f7a; --accent-2:#0a505a; --accent-tint:#dcecee;
    --w:#2f6fb0; --u:#bd8412; --g:#2e9a58;
    --w-t:#e4eef7; --u-t:#f7edd7; --g-t:#e3f3ea;
    --rot:#cf4149; --rot-t:#f8e2e3;
    --shadow:0 1px 2px rgba(20,34,44,.06),0 8px 24px rgba(20,34,44,.06);
    --shadow-lift:0 2px 6px rgba(20,34,44,.10),0 18px 40px rgba(20,34,44,.12);
    --radius:14px; --radius-s:9px;
    --font-sans:"IBM Plex Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
    --font-eng:"IBM Plex Sans Condensed","IBM Plex Sans",Arial,sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --maxw:1240px;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#0d141a; --surface:#141e25; --surface-2:#1b2831; --surface-3:#101920;
    --ink:#e8eff2; --ink-soft:#adbcc4; --muted:#7e8f98; --line:#28373f;
    --accent:#3cb4c1; --accent-2:#69ccd6; --accent-tint:#123037;
    --w:#5b9be0; --u:#dca23c; --g:#48c07d;
    --w-t:#122536; --u-t:#2c2412; --g-t:#12291e;
    --rot:#e86a70; --rot-t:#2e1618;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px rgba(0,0,0,.35);
    --shadow-lift:0 2px 8px rgba(0,0,0,.4),0 22px 46px rgba(0,0,0,.5);
  }}
  :root[data-theme="light"]{
    --bg:#eef1f3; --surface:#ffffff; --surface-2:#e7ecef; --surface-3:#f6f8f9;
    --ink:#15222c; --ink-soft:#43535d; --muted:#71828c; --line:#d6dee2;
    --accent:#0d6f7a; --accent-2:#0a505a; --accent-tint:#dcecee;
    --w:#2f6fb0; --u:#bd8412; --g:#2e9a58; --w-t:#e4eef7; --u-t:#f7edd7; --g-t:#e3f3ea;
    --rot:#cf4149; --rot-t:#f8e2e3;
    --shadow:0 1px 2px rgba(20,34,44,.06),0 8px 24px rgba(20,34,44,.06);
    --shadow-lift:0 2px 6px rgba(20,34,44,.10),0 18px 40px rgba(20,34,44,.12);
  }
  :root[data-theme="dark"]{
    --bg:#0d141a; --surface:#141e25; --surface-2:#1b2831; --surface-3:#101920;
    --ink:#e8eff2; --ink-soft:#adbcc4; --muted:#7e8f98; --line:#28373f;
    --accent:#3cb4c1; --accent-2:#69ccd6; --accent-tint:#123037;
    --w:#5b9be0; --u:#dca23c; --g:#48c07d; --w-t:#122536; --u-t:#2c2412; --g-t:#12291e;
    --rot:#e86a70; --rot-t:#2e1618;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px rgba(0,0,0,.35);
    --shadow-lift:0 2px 8px rgba(0,0,0,.4),0 22px 46px rgba(0,0,0,.5);
  }

  /* ===== Basis ===== */
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);
       font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{margin:0;line-height:1.14;letter-spacing:-.02em;font-weight:700;text-wrap:balance}
  p{margin:0}
  button{font:inherit;color:inherit;cursor:pointer}
  code{font-family:var(--font-mono);font-size:.88em;background:var(--surface-2);
       padding:1px 5px;border-radius:4px}
  .mono{font-family:var(--font-mono)}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;
           text-transform:uppercase;color:var(--muted);font-weight:500}
  .lead{color:var(--ink-soft);max-width:68ch}

  /* ===== Kopfzeile ===== */
  .topbar{position:sticky;top:0;z-index:40;
          background:color-mix(in srgb,var(--surface) 88%,transparent);
          backdrop-filter:saturate(1.2) blur(10px);border-bottom:1px solid var(--line)}
  .topbar-in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:16px;
             padding:11px 20px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;margin-right:auto}
  .brand-mark{width:30px;height:30px;border-radius:8px;
              background:conic-gradient(from 210deg,var(--accent),var(--accent-2));
              display:grid;place-items:center;color:#fff;font-family:var(--font-mono);
              font-weight:700;font-size:13px;box-shadow:var(--shadow)}
  .brand-t{font-weight:700;font-size:15px;line-height:1.05}
  .brand-t small{display:block;font-family:var(--font-mono);font-weight:400;font-size:10px;
                 letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-top:2px}
  .iconbtn{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-s);
           padding:6px 12px;font-size:13px;color:var(--ink-soft)}
  .iconbtn:hover{border-color:var(--accent);color:var(--accent)}

  /* ===== Rumpf ===== */
  main{max-width:var(--maxw);margin:0 auto;padding:8px 20px 80px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
        padding:20px 22px;box-shadow:var(--shadow)}
  .card h2{font-size:24px;margin:6px 0 8px}

  .kopf{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
  .kopf h2{font-size:24px}
  .meldung{border-left:3px solid var(--rot)}

  /* ===== Tabelle ===== */
  .tblwrap{overflow-x:auto}
  .tbl{width:100%;border-collapse:collapse;font-size:14px}
  .tbl th{text-align:left;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;
          text-transform:uppercase;color:var(--muted);font-weight:500;
          padding:0 10px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
  .tbl td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  .tbl tbody tr:last-child td{border-bottom:0}
  .tbl .dim{color:var(--muted);font-size:13px}
  .kid{font-family:var(--font-mono);font-weight:700;color:var(--accent);font-size:13.5px}
  .fort{font-variant-numeric:tabular-nums;color:var(--ink-soft);white-space:nowrap}

  /* ===== Stand je Schritt ===== */
  .pkte{display:flex;gap:3px}
  .pkt{width:17px;height:17px;border-radius:5px;display:grid;place-items:center;flex:none;
       font-family:var(--font-mono);font-size:9.5px;
       background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}
  .pkt.fertig{background:var(--g);border-color:var(--g);color:#fff}
  .pkt.inArbeit{background:var(--u);border-color:var(--u);color:#fff;font-weight:700}

  .knopf{background:var(--accent);color:#fff;border:0;border-radius:var(--radius-s);
         padding:10px 18px;font-size:14px;font-weight:700}
  .knopf:hover{background:var(--accent-2)}
  .knopf.still{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line);font-weight:400}
  .knopf.still:hover{background:var(--surface-3);border-color:var(--accent);color:var(--accent)}
  .knopfreihe{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}

  /* ===== Navigation ===== */
  .navleiste{background:var(--surface);border-bottom:1px solid var(--line)}
  .navleiste-in{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  .navleiste-in:empty{display:none}
  .bereiche{display:flex;gap:4px;padding:9px 0 0}
  .bereiche button{background:transparent;border:0;border-bottom:2px solid transparent;
                   padding:7px 14px 9px;font-size:14px;color:var(--muted);font-weight:600}
  .bereiche button:hover{color:var(--ink)}
  .bereiche button.on{color:var(--accent);border-bottom-color:var(--accent)}
  .pfad{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:0 0 10px;
        font-family:var(--font-mono);font-size:12px}
  .pfad a{color:var(--accent);cursor:pointer;text-decoration:none}
  .pfad a:hover{text-decoration:underline}
  .pfad .hier{color:var(--ink-soft)} .pfad .sep{color:var(--line)}

  /* =====================================================================
     DIE LAUFKARTE — das Begleitblatt des Werkstuecks.
     Ein Raster: Phasen spannen oben, das Gleis laeuft als eine Linie darunter
     hindurch, die Stationen sitzen darauf, die Namen darunter. Keine Ebene
     kreuzt die andere — der frueherer Entwurf liess Gleis, Trenner und Punkte
     im selben Band uebereinanderlaufen.
     ===================================================================== */
  .laufkarte{border-top:2px solid var(--ink);border-bottom:1px solid var(--line);
             padding:0 0 26px;margin-bottom:30px}

  /* Schriftfeld — wie der Titelblock einer technischen Zeichnung */
  .schriftfeld{display:flex;flex-wrap:wrap;align-items:stretch;
               border-bottom:1px solid var(--line);margin-bottom:26px}
  .feld{padding:11px 22px 12px 0;margin-right:22px;border-right:1px solid var(--line);
        display:flex;flex-direction:column;gap:3px;min-width:0}
  .feld:last-child{border-right:0;margin-right:0;padding-right:0}
  .feld .fk{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.18em;
            text-transform:uppercase;color:var(--muted);font-weight:500}
  .feld .fw{font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;
            overflow:hidden;text-overflow:ellipsis}
  .feld.weit{flex:1;min-width:180px}
  .feld.weit .fw{white-space:normal}
  .feld .fw.kennung{font-family:var(--font-mono);letter-spacing:.04em;color:var(--accent);font-weight:600}
  .feld .fw.zahl{font-family:var(--font-mono);font-variant-numeric:tabular-nums}

  .strasse{display:grid;grid-template-columns:repeat(var(--spalten),minmax(74px,1fr));
           align-items:center;row-gap:0;position:relative;overflow-x:auto;padding-top:4px}

  /* Zeile 1 — Phasen als Spannen mit Klammer */
  .spanne{grid-row:1;padding:0 0 13px;position:relative}
  .spanne::after{content:"";position:absolute;left:5px;right:5px;bottom:6px;height:1px;
                 background:var(--line)}
  .spanne .spname{font-family:var(--font-eng);font-size:11.5px;letter-spacing:.1em;
                  text-transform:uppercase;color:var(--muted);font-weight:600;
                  white-space:nowrap;padding-left:5px}
  .strasse.fokus .spanne{opacity:.4;transition:opacity .25s}
  .strasse.fokus .spanne.an{opacity:1}
  .strasse.fokus .spanne.an::after{background:var(--accent);height:2px}
  .strasse.fokus .spanne.an .spname{color:var(--accent)}

  /* Zeile 2 — das Gleis, eine Linie quer durch, hinter den Stempeln */
  .gleis{grid-row:2;height:2px;background:var(--line);position:relative;z-index:0}
  .gleis i{display:block;height:100%;background:var(--g)}

  /* Zeile 2 — die Stationen sitzen auf dem Gleis */
  .station{grid-row:2;justify-self:center;position:relative;z-index:1;
           width:34px;height:34px;padding:0;border:0;background:transparent}
  .stempel{display:grid;place-items:center;width:34px;height:34px;border-radius:50%;
           background:var(--bg);border:2px solid var(--line);color:var(--muted);
           font-family:var(--font-mono);font-size:13px;font-weight:600;
           transition:transform .16s,box-shadow .16s}
  .station:hover .stempel{transform:scale(1.09);border-color:var(--accent);color:var(--accent)}
  .station.fertig .stempel{background:var(--g);border-color:var(--g);color:#fff}
  .station.inArbeit .stempel{background:var(--u);border-color:var(--u);color:#fff}
  .station.hier .stempel{box-shadow:0 0 0 5px var(--accent-tint);border-color:var(--accent)}
  .pruefzeichen{position:absolute;top:-7px;right:-9px;font-size:10px;line-height:16px;
                background:var(--accent);color:#fff;border-radius:3px;padding:0 4px;z-index:2}

  /* Zeile 3 — Beschriftung unter der Station */
  .stbez{grid-row:3;justify-self:center;text-align:center;padding-top:11px;max-width:88px;
         font-family:var(--font-eng);font-size:12px;line-height:1.25;color:var(--muted)}
  .stbez.fertig{color:var(--ink-soft)}
  .stbez.inArbeit{color:var(--ink);font-weight:700}
  .stbez.hier{color:var(--accent);font-weight:700}

  .kettenote{display:flex;gap:22px;flex-wrap:wrap;margin-top:20px;font-size:12.5px;
             color:var(--muted)}
  .kettenote span{display:flex;align-items:center;gap:7px}
  .kdot{width:12px;height:12px;border-radius:50%;border:2px solid var(--line);flex:none}
  .kdot.fertig{background:var(--g);border-color:var(--g)}
  .kdot.inArbeit{background:var(--u);border-color:var(--u)}
  .kdot.gate{background:var(--accent);border-color:var(--accent);border-radius:2px}

  /* =====================================================================
     WERKBANK — zwei Spalten. Links wird gearbeitet, rechts steht Kontext.
     Das ist die Antwort auf „was ist zentral, was unterstuetzend".
     ===================================================================== */
  .werkbank{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:44px;align-items:start}
  @media(max-width:1000px){.werkbank{grid-template-columns:1fr;gap:30px}}

  /* --- Arbeit: erhaben, gross, viel Luft --- */
  .arbeit{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
          padding:34px 38px 30px;box-shadow:var(--shadow-lift)}
  @media(max-width:700px){.arbeit{padding:24px 20px}}
  .sk{margin-bottom:22px}
  .stelle{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
          color:var(--accent);font-weight:700}
  .arbeit h1{font-size:34px;line-height:1.08;letter-spacing:-.03em;margin:9px 0 0}
  @media(max-width:700px){.arbeit h1{font-size:26px}}
  .marken{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
  .marke{font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;
         border-radius:5px;padding:4px 9px;border:1px solid var(--line);
         background:var(--surface-2);color:var(--ink-soft)}
  .marke.ki,.marke.kimensch{border-color:var(--accent);color:var(--accent);background:transparent}
  .marke.mensch{border-color:var(--u);color:var(--u);background:transparent}
  .marke.pruefstelle{border-color:var(--accent);color:#fff;background:var(--accent)}

  .zweck{font-size:19px;line-height:1.55;color:var(--ink-soft);max-width:60ch;
         padding-bottom:26px;border-bottom:1px solid var(--line)}

  h2.tun{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
         font-family:var(--font-mono);font-weight:500;margin:30px 0 18px}

  ol.rezept{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;
            gap:17px;counter-reset:r}
  ol.rezept li{counter-increment:r;display:flex;gap:16px;font-size:16px;line-height:1.6;
               color:var(--ink)}
  ol.rezept li::before{content:counter(r);flex:none;width:27px;height:27px;border-radius:50%;
        background:var(--accent-tint);color:var(--accent);font-family:var(--font-mono);
        font-size:13px;font-weight:700;display:grid;place-items:center;margin-top:1px}
  ol.rezept code{font-size:14px}

  .dd{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:26px}
  @media(max-width:700px){.dd{grid-template-columns:1fr}}
  .ddc{border-top:2px solid var(--line);padding-top:13px}
  .ddc.do{border-top-color:var(--g)} .ddc.dont{border-top-color:var(--rot)}
  .ddc h5{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
          margin:0 0 11px}
  .ddc.do h5{color:var(--g)} .ddc.dont h5{color:var(--rot)}
  .ddc ul{margin:0;padding-left:17px;display:flex;flex-direction:column;gap:9px}
  .ddc li{font-size:14px;color:var(--ink-soft);line-height:1.55}

  .dod{margin-top:26px;border-left:3px solid var(--g);background:var(--g-t);
       border-radius:0 var(--radius-s) var(--radius-s) 0;padding:15px 18px;font-size:15px;color:var(--ink)}
  .dod .h{display:block;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;
          text-transform:uppercase;color:var(--g);margin-bottom:6px;font-weight:700}

  .fuss{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:32px;
        padding-top:22px;border-top:1px solid var(--line)}
  .haken{display:inline-flex;align-items:center;gap:11px;border:2px solid var(--line);
         background:transparent;border-radius:var(--radius-s);padding:12px 20px;
         font-size:15px;font-weight:700}
  .haken .box{width:19px;height:19px;border-radius:5px;border:2px solid var(--muted);
              display:grid;place-items:center;font-size:12px;color:transparent}
  .haken:hover{border-color:var(--accent);color:var(--accent)}
  .haken.an{border-color:var(--g);color:var(--g)}
  .haken.an .box{background:var(--g);border-color:var(--g);color:#fff}
  .weiter{border:0;background:var(--accent);color:#fff;border-radius:var(--radius-s);
          padding:13px 21px;font-size:15px;font-weight:700}
  .weiter:hover:not(:disabled){background:var(--accent-2)}
  .weiter:disabled{background:var(--surface-2);color:var(--muted);cursor:not-allowed}
  .wirkung{flex-basis:100%;font-size:13px;color:var(--muted);line-height:1.5;margin-top:4px}

  /* --- Kontext: flach, ruhig, keine Karten --- */
  .kontext{display:flex;flex-direction:column;gap:26px;position:sticky;top:96px}
  @media(max-width:1000px){.kontext{position:static}}
  .kblock h3{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;
             text-transform:uppercase;color:var(--muted);font-weight:500;
             padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:11px}
  .kblock p{font-size:14px;line-height:1.55;color:var(--ink-soft);margin-bottom:9px}
  .kblock p:last-child{margin-bottom:0}
  .kblock a{display:block;font-size:13px;color:var(--accent);cursor:pointer;
            text-decoration:none;margin-top:5px}
  .kblock a:hover{text-decoration:underline}
  .kblock em{display:block;font-style:normal;font-size:12.5px;color:var(--muted);margin-top:6px}
  .kblock .pfad{display:block;font-family:var(--font-mono);font-size:12.5px;color:var(--accent);
                line-height:1.5;word-break:break-all}
  .kblock .pfad b{color:var(--ink)}
  .wege{display:flex;gap:7px;flex-wrap:wrap}
  .weg{font-size:12px;padding:4px 10px;border-radius:5px;border:1px solid var(--line);color:var(--muted)}
  .weg.chat{border-color:var(--g);color:var(--g)}
  .weg.claude-code{border-color:var(--accent);color:var(--accent)}

  .dkopf{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;
         padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:11px}
  .dkopf h3{border:0;padding:0;margin:0}
  .oeffnen{font-family:var(--font-mono);font-size:11px;color:var(--accent);text-decoration:none;
           white-space:nowrap}
  .oeffnen:hover{text-decoration:underline}
  .dliste{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
  .dliste li{display:flex;flex-direction:column;gap:2px}
  .dliste a{display:block;font-family:var(--font-mono);font-size:12.5px;color:var(--ink);
            text-decoration:none;margin:0;word-break:break-all}
  .dliste a:hover{color:var(--accent)}
  .dmeta{font-size:11.5px;color:var(--muted);font-family:var(--font-mono)}
  .dim{font-size:13px;color:var(--muted)}

  /* =====================================================================
     DAS INSTRUMENT — der Masterprompt ist das Kernstueck des Schritts.
     Traegt den Akzent, kopierbar ohne Aufklappen, eigenes Gewicht.
     ===================================================================== */
  .wtools{display:flex;flex-direction:column;gap:12px}

  .wtool.instrument{border:1px solid var(--accent);border-left:5px solid var(--accent);
                    border-radius:var(--radius-s);background:var(--accent-tint);overflow:hidden}
  .wkopf{display:flex;align-items:center;gap:16px;padding:18px 20px;flex-wrap:wrap}
  .wkopf .tt{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;
             text-transform:uppercase;background:var(--accent);color:#fff;
             border-radius:4px;padding:4px 9px;font-weight:700;flex:none}
  .wtitel{flex:1;min-width:210px}
  .wtitel h3{font-size:19px;line-height:1.2;letter-spacing:-.02em}
  .wtitel p{font-size:14px;color:var(--ink-soft);margin-top:4px}
  .knopf.gross{padding:13px 22px;font-size:15px;box-shadow:var(--shadow)}
  .ansehen{background:transparent;border:1px solid var(--accent);color:var(--accent);
           border-radius:var(--radius-s);padding:12px 16px;font-size:14px;font-weight:600;
           display:inline-flex;align-items:center;gap:7px}
  .ansehen:hover{background:var(--surface)}
  .ansehen .ar{font-size:11px;transition:transform .18s}
  .wtool.instrument.auf .ansehen .ar{transform:rotate(90deg)}
  .wtool.instrument .wbody{border-top:1px solid var(--accent);background:var(--surface);
                           padding:20px;display:none}
  .wtool.instrument.auf .wbody{display:block}

  /* Zubehoer bleibt ruhig */
  .wtool{border:1px solid var(--line);border-radius:var(--radius-s);background:var(--surface-3);
         overflow:hidden}
  .wbtn{display:flex;align-items:center;gap:14px;padding:15px 18px;width:100%;text-align:left;
        background:transparent;border:0}
  .wbtn:hover{background:var(--surface-2)}
  .wbtn .tt{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
            border:1px solid var(--line);border-radius:4px;padding:3px 8px;color:var(--muted);flex:none}
  .wbtn .wt{flex:1;font-size:15px;font-weight:600}
  .wbtn .wt em{display:block;font-style:normal;font-size:13px;color:var(--muted);
               font-weight:400;margin-top:3px}
  .wbtn .ar{color:var(--muted);font-size:13px;transition:transform .18s}
  .wtool.auf:not(.instrument) .wbtn .ar{transform:rotate(90deg);color:var(--accent)}
  .wtool.auf:not(.instrument){border-color:var(--accent);background:var(--surface)}
  .wtool:not(.instrument) .wbody{border-top:1px solid var(--line);padding:18px;display:none}
  .wtool.auf:not(.instrument) .wbody{display:block}

  .ptabs{display:flex;gap:6px;margin-bottom:13px}
  .ptab{border:1px solid var(--line);background:transparent;border-radius:6px;padding:6px 14px;
        font-size:14px;color:var(--ink-soft);font-weight:600}
  .ptab.on{background:var(--accent);border-color:var(--accent);color:#fff}
  pre.prompt{display:none;font-family:var(--font-mono);font-size:12.5px;line-height:1.65;
             background:var(--surface-3);border:1px solid var(--line);border-radius:8px;
             padding:17px;margin:0;white-space:pre-wrap;color:var(--ink-soft);
             max-height:420px;overflow:auto}
  pre.prompt.on{display:block}
  .prow{display:flex;align-items:center;gap:13px;flex-wrap:wrap;margin-top:14px}
  .when{font-size:14px;color:var(--ink-soft);margin-bottom:14px;line-height:1.55}

  h2.tun .tun-sub{display:block;font-family:var(--font-sans);font-size:13px;letter-spacing:0;
                  text-transform:none;color:var(--muted);font-weight:400;margin-top:5px}

  /* ===== Ergebnis ablegen — der Weg Chat ===== */
  .ablegen{border:1px dashed var(--accent);border-radius:var(--radius-s);padding:18px 20px;
           background:var(--surface-3)}
  .ablegen textarea{width:100%;font-family:var(--font-mono);font-size:12.5px;line-height:1.6;
                    background:var(--surface);color:var(--ink);border:1px solid var(--line);
                    border-radius:8px;padding:13px 15px;resize:vertical}
  .ablegen textarea:focus{border-color:var(--accent);outline:none}
  .arow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:13px}
  .zielname{font-size:13px;color:var(--muted)}
  .zielname code{font-size:12.5px;background:var(--surface-2);color:var(--ink-soft)}
  .ablegen p.dim{margin-top:10px;font-size:12.5px}
  .hinweis{display:flex;align-items:center;gap:11px;background:var(--g-t);
           border-left:3px solid var(--g);border-radius:0 var(--radius-s) var(--radius-s) 0;
           padding:13px 17px;margin-bottom:18px;font-size:14.5px;color:var(--ink)}
  .hinweis b{color:var(--g)}

  /* =====================================================================
     NACHSCHLAGEN — ein Regelwerk, kein Kachelbrett.
     Die Bausteine stammen aus v0.2 (principle, wugrow, bloomcal, anchor,
     govgrid, flowsteps ...). Sie bekommen hier Regeln statt Kaesten,
     dieselbe Sprache wie die Laufkarte.
     ===================================================================== */
  .werkkopf{border-top:2px solid var(--ink);margin-bottom:34px}
  .werkwahl{display:flex;gap:0;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .werkwahl button{background:transparent;border:0;border-bottom:2px solid transparent;
                   margin-bottom:-1px;padding:12px 20px 13px;font-family:var(--font-eng);
                   font-size:15px;letter-spacing:.02em;color:var(--muted);font-weight:600}
  .werkwahl button:hover{color:var(--ink)}
  .werkwahl button.on{color:var(--accent);border-bottom-color:var(--accent)}

  .werkbank.werk{grid-template-columns:minmax(0,1fr) 240px}
  @media(max-width:1000px){.werkbank.werk{grid-template-columns:1fr}}
  .werktext{max-width:70ch}
  .kapitel{padding-bottom:38px;margin-bottom:38px;border-bottom:1px solid var(--line)}
  .kapitel:last-child{border-bottom:0;margin-bottom:0}
  .kapitel h2{font-size:25px;letter-spacing:-.02em;margin-bottom:20px;
              display:flex;align-items:baseline;gap:14px}
  .knr{font-family:var(--font-mono);font-size:14px;font-weight:500;color:var(--accent);
       flex:none}
  .kapitel .inhalt{font-size:16px;line-height:1.65;color:var(--ink-soft)}
  .kapitel .inhalt > p{margin-bottom:14px}
  .kapitel .inhalt b{color:var(--ink)}
  .kapliste{margin:0;padding:0;list-style:none;counter-reset:kk;
            display:flex;flex-direction:column;gap:10px}
  .kapliste li{counter-increment:kk;display:flex;gap:10px;font-size:13.5px;line-height:1.4}
  .kapliste li::before{content:counter(kk);font-family:var(--font-mono);font-size:11px;
                       color:var(--accent);flex:none;padding-top:2px}
  .kapliste a{color:var(--ink-soft);text-decoration:none;margin-top:0;font-size:13.5px}
  .kapliste a:hover{color:var(--accent)}

  /* --- Test – Learn – Test --- */
  .principle{display:flex;align-items:stretch;gap:0;flex-wrap:wrap;margin:6px 0 4px}
  .principle .step{flex:1;min-width:150px;padding:16px 20px 18px;border-left:2px solid var(--accent)}
  .principle .step .n{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.2em;
                      color:var(--accent);font-weight:600}
  .principle .step h4{font-size:17px;margin:7px 0 6px}
  .principle .step p{font-size:14px;color:var(--muted);line-height:1.5}
  .principle .arrow{align-self:center;color:var(--line);font-size:20px;padding:0 4px}

  /* --- W-U-G --- */
  .wugrow{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin:6px 0}
  @media(max-width:760px){.wugrow{grid-template-columns:1fr}}
  .wugcard{padding:18px 22px;border-left:1px solid var(--line)}
  .wugcard:first-child{border-left:0;padding-left:0}
  .wugcard h4{font-size:18px;margin:10px 0 4px}
  .wugcard .sub{display:block;font-family:var(--font-eng);font-size:12.5px;
                letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .wugcard p{font-size:14px;line-height:1.55;color:var(--ink-soft)}
  .wug{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:50%;
       font-family:var(--font-mono);font-weight:600;font-size:14px;color:#fff}
  .wug.W{background:var(--w)} .wug.U{background:var(--u)} .wug.G{background:var(--g)}

  /* --- Praesenzdesign 30/50/20 --- */
  .ratio{display:flex;height:34px;margin:8px 0 4px;font-family:var(--font-eng);
         font-size:12.5px;font-weight:600;color:#fff;letter-spacing:.04em}
  .ratio > div{display:grid;place-items:center;padding:0 8px;text-align:center}

  /* --- Bloom-Kalibrierung: eine Leiter, keine Kaesten --- */
  .bloomcal{display:flex;flex-direction:column;margin:4px 0}
  .bloomcal .r{display:flex;align-items:baseline;gap:16px;padding:11px 0;
               border-bottom:1px solid var(--line);font-size:15px}
  .bloomcal .r:last-child{border-bottom:0}
  .bloomcal .lvl{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.1em;
                 text-transform:uppercase;color:var(--accent);min-width:64px;flex:none}

  /* --- Bloom-Anker: Zitate --- */
  .anchor{border-left:2px solid var(--line);padding:4px 0 4px 18px;margin-bottom:14px;
          font-size:15px;line-height:1.55}
  .anchor b{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
            text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:5px}

  /* --- Raster fuer Merksaetze --- */
  .govgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;margin:4px 0}
  @media(max-width:760px){.govgrid{grid-template-columns:1fr}}
  .govcard{padding:16px 22px 18px;border-left:1px solid var(--line);
           border-bottom:1px solid var(--line)}
  .govcard h5{font-family:var(--font-eng);font-size:14px;letter-spacing:.02em;
              color:var(--ink);margin:0 0 9px}
  .govcard ul{margin:0;padding-left:16px;display:flex;flex-direction:column;gap:7px}
  .govcard li{font-size:14px;line-height:1.5;color:var(--ink-soft)}

  /* --- Ablauf in Schritten --- */
  .flowsteps{display:flex;align-items:stretch;flex-wrap:wrap;gap:0;margin:6px 0}
  .fstep{flex:1;min-width:150px;padding:14px 18px;border-top:2px solid var(--accent)}
  .fstep .n{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;
            color:var(--accent);font-weight:600}
  .fstep h5{font-size:15px;margin:7px 0 5px}
  .fstep p{font-size:13.5px;color:var(--muted);line-height:1.5}
  .farr{align-self:center;color:var(--line);font-size:18px;padding:0 2px}

  /* --- Do / Dont im Regelwerk --- */
  .ddgrid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin:6px 0}
  @media(max-width:760px){.ddgrid{grid-template-columns:1fr}}
  .ddcol{border-top:2px solid var(--line);padding-top:12px}
  .ddcol.do{border-top-color:var(--g)} .ddcol.dont{border-top-color:var(--rot)}
  .ddcol h5{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;
            text-transform:uppercase;margin:0 0 10px}
  .ddcol.do h5{color:var(--g)} .ddcol.dont h5{color:var(--rot)}
  .ddcol ul{margin:0;padding-left:17px;display:flex;flex-direction:column;gap:8px}
  .ddcol li{font-size:14px;line-height:1.5}

  /* --- Hinweise, Warnungen --- */
  .note{border-left:2px solid var(--accent);background:var(--surface-3);
        padding:14px 18px;margin:6px 0 12px;font-size:14.5px;line-height:1.55}
  .note .h{display:block;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;
           text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:6px}
  .disclaimer{border-left:2px solid var(--u);background:var(--u-t);padding:15px 19px;
              margin:14px 0;font-size:14.5px;line-height:1.55;color:var(--ink)}
  .disclaimer .h{display:block;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;
                 text-transform:uppercase;color:var(--u);font-weight:600;margin-bottom:6px}

  /* --- Listen, Tabellen, Kleinteile --- */
  ol.gsteps{margin:0;padding-left:0;list-style:none;counter-reset:g;
            display:flex;flex-direction:column;gap:13px}
  ol.gsteps li{counter-increment:g;display:flex;gap:14px;font-size:15px;line-height:1.6}
  ol.gsteps li::before{content:counter(g);flex:none;width:24px;height:24px;border-radius:50%;
        background:var(--accent-tint);color:var(--accent);font-family:var(--font-mono);
        font-size:12px;font-weight:600;display:grid;place-items:center;margin-top:1px}
  .kapitel .inhalt table{width:100%;border-collapse:collapse;font-size:14px;margin:8px 0}
  .kapitel .inhalt th{text-align:left;font-family:var(--font-mono);font-size:10.5px;
                      letter-spacing:.13em;text-transform:uppercase;color:var(--muted);
                      font-weight:500;padding:0 12px 9px 0;border-bottom:1px solid var(--line)}
  .kapitel .inhalt td{padding:11px 12px 11px 0;border-bottom:1px solid var(--line);
                      vertical-align:top}
  .kapitel .inhalt td.center{text-align:center}
  .grid{display:grid;gap:22px} .grid.g2{grid-template-columns:1fr 1fr}
  @media(max-width:760px){.grid.g2{grid-template-columns:1fr}}
  .th{font-weight:600;color:var(--ink)}
  .tick{color:var(--g);font-weight:600} .cross{color:var(--rot);font-weight:600}
  .proto-flag{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;
              color:var(--muted);background:var(--surface-2);border-radius:3px;padding:1px 6px}
  .toolbadge{font-family:var(--font-eng);font-size:12px;letter-spacing:.04em;font-weight:600;
             border:1px solid var(--line);border-radius:3px;padding:2px 8px;color:var(--ink-soft)}
  .toolbadge.claude{border-color:var(--accent);color:var(--accent)}
  .toolbadge.chatgpt{border-color:var(--g);color:var(--g)}
  .toolbadge.beide{border-color:var(--muted);color:var(--muted)}
  /* Verweise aus v0.2 zeigen hier ins Leere — nicht als Knopf ausgeben. */
  .kapitel .inhalt .linklike{all:unset;color:var(--ink-soft);font-style:italic;cursor:default}

  .naechst{border-left:3px solid var(--u);margin-top:18px}
  .naechst h3{font-size:20px;margin:8px 0 9px}

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <div class="brand-mark">&#8635;</div>
      <div class="brand-t">Kurswerkstatt<small>Lerninhalte umgiessen</small></div>
    </div>
    <button class="iconbtn" data-action="theme" title="Hell / Dunkel">&#9681;</button>
  </div>
</div>

<div class="navleiste"><div class="navleiste-in" id="nav"></div></div>

<main id="app"><p class="lead">Wird geladen &hellip;</p></main>

<script src="inhalt.js"></script>
<script src="ansichten.js"></script>
<script src="app.js"></script>
</body>
</html>
