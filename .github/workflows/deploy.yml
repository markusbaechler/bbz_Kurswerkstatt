name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: for f in *.js; do node --check "$f" || exit 1; done

      - name: Unit tests
        run: node --test

      - name: Stamp version
        run: |
          SHA="${GITHUB_SHA::7}"
          for f in *.js; do
            [ "$f" = "service-worker.js" ] && continue
            sed -i "s#src=\"$f\"#src=\"$f?v=$SHA\"#g" index.html
          done
          sed -i "s#const CACHE = '[^']*'#const CACHE = 'bbz-kw-$SHA'#g" service-worker.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
